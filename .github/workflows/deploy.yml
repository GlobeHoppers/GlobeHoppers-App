name: Build JourneyLines and Publish gh-pages Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./journeylines

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check project files
        run: |
          pwd
          ls -la
          node --version
          npm --version
          test -f package.json && echo "package.json found"

      - name: Install dependencies
        run: npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Build
        run: npm run build

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./journeylines/dist
          publish_branch: gh-pages
          force_orphan: true
