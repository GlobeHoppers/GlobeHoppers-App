name: Build JourneyLines and Publish gh-pages Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./journeylines

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository structure
        run: |
          echo "Current directory:"
          pwd
          echo "Files in project folder:"
          ls -la
          echo "Repo commit: ${{ github.sha }}"
          test -f package.json && echo "package.json found"
          test -f ../.github/workflows/deploy.yml && echo "root workflow is present"

      - name: Verify Mapbox token secret for private route generation
        env:
          MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
        run: |
          if [ -z "$MAPBOX_TOKEN" ]; then
            echo "::error::VITE_MAPBOX_TOKEN is missing. Check Repo Settings → Secrets and variables → Actions → Repository secrets."
            exit 1
          fi

          if [[ "$MAPBOX_TOKEN" != pk.* ]]; then
            echo "::error::VITE_MAPBOX_TOKEN exists, but it does not start with pk. Use a Mapbox public token."
            exit 1
          fi

          echo "VITE_MAPBOX_TOKEN is present for private build-time route generation."
          echo "Token prefix: ${MAPBOX_TOKEN:0:3}"
          echo "Token length: ${#MAPBOX_TOKEN}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Remove old runtime config from source
        run: |
          rm -f public/runtime-config.js
          rm -f runtime-config.js
          echo "Checked for old runtime-config.js files before build."
          find . -name "runtime-config.js" -print

      - name: Generate Mapbox driving route cache privately
        env:
          MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
        run: npm run generate:routes

      - name: Verify generated route cache
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('src/data/generatedRoutes.json', 'utf8'));
          console.log('generatedRoutes source:', data.source);
          console.log('generatedRoutes version:', data.version);
          console.log('generatedRoutes routeCount:', data.routeCount);
          console.log('generatedRoutes failedRouteCount:', data.failedRouteCount);
          if (!data.routes || Object.keys(data.routes).length === 0) {
            console.error('No generated routes were found.');
            process.exit(1);
          }
          NODE

      - name: Build without exposing token to Vite
        run: npm run build

      - name: Remove runtime config from dist
        run: |
          rm -f dist/runtime-config.js
          echo "Dist root after removing runtime-config.js:"
          ls -la dist
          echo "Any runtime-config.js files remaining?"
          find dist -name "runtime-config.js" -print

      - name: Verify dist contains no Mapbox token or runtime config
        env:
          MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
        run: |
          if find dist -name "runtime-config.js" | grep -q .; then
            echo "::error::runtime-config.js still exists in dist. It must not be published."
            find dist -name "runtime-config.js" -print
            exit 1
          fi

          if grep -R -q -F "$MAPBOX_TOKEN" dist; then
            echo "::error::The Mapbox token was found in dist. It must not be published."
            exit 1
          fi

          if grep -R -q "mapboxToken" dist; then
            echo "::warning::Found text mapboxToken in dist. Showing locations:"
            grep -R -n "mapboxToken" dist || true
          fi

          echo "Verified: no runtime-config.js and no Mapbox token are present in dist."

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./journeylines/dist
          publish_branch: gh-pages
          force_orphan: true
